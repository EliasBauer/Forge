repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff (lint)
        entry: uv run --group dev ruff check .
        language: system
        always_run: true
        pass_filenames: false

      - id: ruff-format-check
        name: ruff (format check)
        entry: uv run --group dev ruff format --check .
        language: system
        always_run: true
        pass_filenames: false

      - id: pytest
        name: pytest (backend)
        entry: uv run --group dev pytest
        language: system
        always_run: true
        pass_filenames: false

      - id: mypy
        name: mypy (type check)
        entry: uv run --group dev mypy src tests
        language: system
        always_run: true
        pass_filenames: false

      - id: vitest
        name: vitest (frontend)
        entry: npm --prefix frontend test
        language: system
        always_run: true
        pass_filenames: false
